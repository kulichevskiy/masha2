<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maria Chevskaya — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { font-family: var(--font-inter); color: var(--fg); }
  * { box-sizing: border-box; }

  /* Kit toolbar */
  .kit-bar {
    position: fixed; top: 12px; left: 12px; z-index: 200;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px;
    display: flex; gap: 4px;
    font-family: var(--font-geist-sans);
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }
  .kit-bar button {
    border: 0; background: transparent; cursor: pointer;
    font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
    padding: 6px 14px; border-radius: 999px;
    color: var(--muted); font-family: inherit;
    text-transform: uppercase;
  }
  .kit-bar button.active { background: var(--fg); color: #fff; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="TopNav.jsx"></script>
<script type="text/babel" src="FloatingBookButton.jsx"></script>
<script type="text/babel" src="MasonryGrid.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="BookPage.jsx"></script>
<script type="text/babel" src="LoginCard.jsx"></script>
<script type="text/babel" src="AdminShell.jsx"></script>

<script type="text/babel">
function App() {
  const [view, setView] = React.useState("home"); // home | book | login | admin
  const goHome  = () => setView("home");
  const goBook  = () => setView("book");
  const goLogin = () => setView("login");
  const goAdmin = () => setView("admin");

  const PublicShell = ({ children }) => (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", background: "#fff" }}>
      <TopNav onHome={goHome}/>
      <div style={{ flex: 1 }}>{children}</div>
      <Footer onHome={goHome} onLogin={goLogin}/>
      <FloatingBookButton onClick={goBook}/>
    </div>
  );

  return (
    <>
      <div className="kit-bar">
        <button className={view === "home"  ? "active" : ""} onClick={goHome}>Home</button>
        <button className={view === "book"  ? "active" : ""} onClick={goBook}>Book</button>
        <button className={view === "login" ? "active" : ""} onClick={goLogin}>Login</button>
        <button className={view === "admin" ? "active" : ""} onClick={goAdmin}>Admin</button>
      </div>

      {view === "home" && (
        <PublicShell>
          <div style={{ maxWidth: 1280, margin: "0 auto", width: "100%", padding: "32px 24px" }}>
            <MasonryGrid/>
          </div>
        </PublicShell>
      )}

      {view === "book" && (
        <PublicShell>
          <BookPage/>
        </PublicShell>
      )}

      {view === "login" && <LoginCard onSubmit={goAdmin}/>}

      {view === "admin" && <AdminShell email="maria.chevskaya@gmail.com" onLogout={goHome}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
