<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-inter); color: var(--fg); background: var(--bg); padding: 24px 32px; }
  .row { display: grid; grid-template-columns: 90px 1fr; align-items: center; gap: 20px; margin-bottom: 10px; }
  .tok { font-family: var(--font-roboto-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
  .bar { height: 14px; background: var(--fg); }
  .meta { font-family: var(--font-inter); font-size: 11px; color: var(--muted); margin-left: 10px; }
  .cap { font-family: var(--font-bebas-neue); font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg); margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="cap">Spacing scale</div>
  <div class="row"><div class="tok">--space-2</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="tok">--space-4</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="tok">--space-6</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="tok">--space-8</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="tok">--space-12</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="tok">--space-16</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="tok">--space-24</div><div class="bar" style="width:96px"></div></div>
</body>
</html>
