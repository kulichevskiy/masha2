<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-inter); color: var(--fg); background: var(--bg); padding: 32px; }
  .nav { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .wm { font-family: var(--font-bebas-neue); font-size: 48px; line-height: 1; letter-spacing: -0.02em; text-transform: uppercase; color: var(--fg); }
  .tag { font-family: var(--font-inter); font-size: 14px; letter-spacing: 0.15em; text-transform: lowercase; color: var(--muted); }
</style>
</head>
<body>
  <div class="nav">
    <div class="wm">Maria Chevskaya</div>
    <div class="tag">portrait and editorial photographer</div>
  </div>
</body>
</html>
