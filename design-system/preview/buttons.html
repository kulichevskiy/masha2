<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-inter); color: var(--fg); background: var(--bg); padding: 32px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .group { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .label { font-family: var(--font-roboto-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .cta { font-family: var(--font-bebas-neue); font-size: 20px; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; background: #000; padding: 12px 56px; border: 0; border-radius: 0; }
  .cta.float { background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); padding: 12px 80px; }
  .cta.email { padding: 12px 56px; }
  .cta.hover { background: #1f2937; }
</style>
</head>
<body>
  <div class="group"><div class="label">Primary · EMAIL ME</div><div class="cta email">EMAIL ME</div></div>
  <div class="group"><div class="label">Floating · BOOK</div><div class="cta float">BOOK</div></div>
  <div class="group"><div class="label">Hover (darken)</div><div class="cta hover">EMAIL ME</div></div>
</body>
</html>
