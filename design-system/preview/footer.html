<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Footer</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-inter); color: var(--fg); background: var(--bg); padding: 0; }
  footer { border-top: 1px solid var(--border); padding: 28px 16px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .wm { font-family: var(--font-bebas-neue); font-size: 24px; line-height: 1; letter-spacing: -0.02em; text-transform: uppercase; color: var(--fg); opacity: 0.5; }
  .tag { font-family: var(--font-inter); font-size: 13px; letter-spacing: 0.1em; text-transform: lowercase; color: var(--muted); opacity: 0.5; }
  .icons { display: flex; gap: 12px; color: var(--muted); opacity: 0.5; }
  .icons svg {
    width: 22px; height: 22px;
    stroke: currentColor; fill: none;
    stroke-width: 1.25;
    stroke-linecap: square;
    stroke-linejoin: miter;
    stroke-miterlimit: 10;
  }
  .copy { font-size: 13px; color: var(--muted); opacity: 0.5; }
</style>
</head>
<body>
  <footer>
    <div class="wm">Maria Chevskaya</div>
    <div class="tag">portrait and editorial photographer</div>
    <div class="icons">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18"/><circle cx="12" cy="12" r="4.5"/><rect x="16.5" y="5.5" width="2" height="2"/></svg>
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14"/><polyline points="3,5 12,13 21,5"/></svg>
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21 L4 19 Q4 15 8 15 L16 15 Q20 15 20 19 L20 21"/></svg>
    </div>
    <div class="copy">© 2026 Maria Chevskaya. All rights reserved.</div>
  </footer>
</body>
</html>
