<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Nav (glass)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-inter); color: var(--fg); background: #000; padding: 0; }
  .bg { position: relative; height: 220px; background-image: url('../assets/photos/DSC_2348-Edit.jpg'); background-size: cover; background-position: center; }
  .nav { position: absolute; inset: 0 0 auto 0; background: rgba(255,255,255,0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 20px 24px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .wm { font-family: var(--font-bebas-neue); font-size: 36px; line-height: 1; letter-spacing: -0.02em; text-transform: uppercase; color: #111; }
  .tag { font-family: var(--font-inter); font-size: 12px; letter-spacing: 0.15em; text-transform: lowercase; color: #6b7280; }
</style>
</head>
<body>
  <div class="bg">
    <div class="nav">
      <div class="wm">Maria Chevskaya</div>
      <div class="tag">portrait and editorial photographer</div>
    </div>
  </div>
</body>
</html>
