<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-inter); color: var(--fg); background: var(--bg); padding: 24px 32px; }
  .stack { display: flex; flex-direction: column; gap: 18px; max-width: 560px; }
  .row { display: grid; grid-template-columns: 120px 1fr; gap: 20px; align-items: baseline; }
  .label { font-family: var(--font-roboto-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .tag { font-family: var(--font-inter); font-size: 14px; letter-spacing: 0.15em; text-transform: lowercase; color: var(--muted); }
  .body { font-family: var(--font-inter); font-size: 16px; line-height: 1.65; color: var(--text); }
  .body b { color: var(--fg); font-weight: 400; }
  .meta { font-family: var(--font-inter); font-size: 14px; color: var(--muted); }
  .mono { font-family: var(--font-roboto-mono); font-size: 13px; color: var(--muted); letter-spacing: 0.03em; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="label">Tagline · 14</div><div class="tag">portrait and editorial photographer</div></div>
    <div class="row"><div class="label">Body · 16</div><div class="body">People I work with are seen, not just photographed. <b>Portrait sessions — from 450 €.</b></div></div>
    <div class="row"><div class="label">Meta · 14</div><div class="meta">© 2026 Maria Chevskaya. All rights reserved.</div></div>
    <div class="row"><div class="label">Mono · 13</div><div class="mono">f/1.8 &nbsp; 1/200s &nbsp; ISO 400</div></div>
  </div>
</body>
</html>
