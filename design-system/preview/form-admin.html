<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Form — Admin / Login</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-geist-sans); color: var(--fg); background: var(--bg); padding: 24px; }
  .card {
    border: 1px solid var(--border);
    border-radius: 0;
    padding: 24px;
    max-width: 360px;
    background: #fff;
  }
  h3 { margin: 0 0 4px; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  p.lede { margin: 0 0 18px; font-size: 13px; color: var(--muted); }
  label { display: block; font-size: 13px; margin-bottom: 6px; font-weight: 500; }
  .row-lbl { display: flex; align-items: center; margin-bottom: 6px; }
  .row-lbl a { margin-left: auto; font-size: 12px; color: var(--fg); text-decoration: none; }
  .row-lbl a:hover { text-decoration: underline; }
  input {
    width: 100%; height: 36px;
    border: 1px solid var(--border); border-radius: 0;
    padding: 0 12px; font-size: 14px;
    box-sizing: border-box; background: transparent;
    font-family: inherit;
  }
  input:focus { outline: none; border-color: var(--fg); }

  /* Primary CTA — hard rectangle, Inter regular, uppercase with tracking. No Bebas — the CTA is a button, not a display headline. */
  .btn-cta {
    width: 100%;
    height: 44px;
    margin-top: 16px;
    background: #000;
    color: #fff;
    border: 0;
    border-radius: 0;
    font-family: var(--font-inter);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.02em;
    text-transform: lowercase;
    cursor: pointer;
    transition: background-color 150ms ease;
  }
  .btn-cta:hover { background: #1f2937; }

  .divider {
    position: relative; text-align: center; font-size: 12px;
    color: var(--muted); margin: 14px 0 12px;
  }
  .divider::before {
    content: ""; position: absolute; inset: 50% 0 auto 0;
    transform: translateY(-50%); height: 1px; background: var(--border);
  }
  .divider span { position: relative; background: #fff; padding: 0 10px; text-transform: lowercase; }

  /* Secondary — quiet ghost link, lowercase Inter, single hairline underline on hover.
     The brand's primary CTA is already loud (solid black plate); the OAuth option
     shouldn't compete with it. */
  .btn-alt {
    width: 100%;
    height: 36px;
    background: transparent;
    color: var(--muted);
    border: 0;
    border-radius: 0;
    font-family: var(--font-inter);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.02em;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: color 150ms ease;
    padding: 0;
  }
  .btn-alt .lbl { position: relative; padding-bottom: 2px; border-bottom: 1px solid transparent; transition: border-color 150ms ease, color 150ms ease; }
  .btn-alt:hover { color: var(--fg); }
  .btn-alt:hover .lbl { border-bottom-color: var(--fg); }

  .field + .field { margin-top: 12px; }
</style>
</head>
<body>
  <div class="card">
    <h3>Вход</h3>
    <p class="lede">Введите email для входа в аккаунт</p>

    <div class="field">
      <label>Email</label>
      <input placeholder="email@example.com">
    </div>
    <div class="field">
      <div class="row-lbl">
        <label style="margin:0">Пароль</label>
        <a href="#">Восстановить пароль</a>
      </div>
      <input type="password">
    </div>

    <button class="btn-cta">войти</button>

    <div class="divider"><span>или</span></div>

    <button class="btn-alt">
      <svg aria-hidden="true" viewBox="0 0 24 24" style="width:14px;height:14px">
        <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.4-1.67 4.1-5.5 4.1-3.31 0-6.01-2.74-6.01-6.1S8.69 5.9 12 5.9c1.88 0 3.14.8 3.86 1.48l2.63-2.54C16.85 3.3 14.62 2.3 12 2.3 6.98 2.3 2.9 6.38 2.9 11.4s4.08 9.1 9.1 9.1c5.26 0 8.74-3.69 8.74-8.89 0-.6-.06-1.05-.14-1.51H12z"/>
        <path fill="#4285F4" d="M21.6 12.23c0-.67-.06-1.31-.17-1.93H12v3.65h5.42c-.23 1.26-.95 2.33-2.02 3.05v2.53h3.27c1.92-1.77 3.03-4.38 3.03-7.3z"/>
        <path fill="#FBBC05" d="M5.5 13.73a5.87 5.87 0 010-3.47V7.72H2.17a9.7 9.7 0 000 8.56l3.33-2.55z"/>
        <path fill="#34A853" d="M12 20.5c2.7 0 4.96-.9 6.62-2.44l-3.27-2.53c-.9.61-2.08.98-3.35.98-2.58 0-4.76-1.74-5.54-4.08l-3.33 2.55A9.98 9.98 0 0012 20.5z"/>
      </svg>
      <span class="lbl">войти через Google</span>
    </button>
  </div>
</body>
</html>
